<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <title>finHub. · Acceder</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { color-scheme: light only; }

    :root {
      --bg:      #f5f0e8;
      --surface: #fdfaf4;
      --border:  #e0d8cc;
      --ink:     #1a1a14;
      --ink2:    #3a3830;
      --muted:   #8a8070;
      --accent:  #3d6b52;
      --error:   #b85050;
      --font:    ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: #f5f0e8 !important;
      color: #1a1a14 !important;
      font-family: var(--font);
      font-weight: 300;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, #ccc4b4 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.4;
      pointer-events: none;
    }

    .layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* ── PANEL IZQUIERDO ── */
    .panel-left {
      background: var(--accent);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      position: relative;
      overflow: hidden;
      padding: 60px 40px;
    }

    .panel-left::before {
      content: '';
      position: absolute;
      width: 480px; height: 480px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.07);
      bottom: -200px; right: -140px;
    }
    .panel-left::after {
      content: '';
      position: absolute;
      width: 260px; height: 260px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.05);
      top: 60px; left: 40px;
    }

    .panel-logo-area { position: relative; z-index: 1; text-align: center; }

    .panel-wordmark {
      font-family: var(--font);
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-top: 20px;
    }

    .panel-tagline {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.55);
      margin-top: 10px;
      letter-spacing: 0.01em;
    }

    /* ── PANEL DERECHO ── */
    .panel-right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 48px;
    }

    .form-wrap {
      width: 100%;
      max-width: 380px;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo chico en el form (mobile) */
    .form-logo {
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .form-title {
      font-family: var(--font);
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .form-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink);
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 300;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      border-radius: 6px;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61,107,82,0.1);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: var(--accent);
      color: #fdfaf4;
      border: none;
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.2s, transform 0.15s;
    }

    .btn:hover { background: #2d5240; }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .divider {
      display: flex; align-items: center; gap: 16px;
      margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider span { font-size: 0.72rem; color: var(--muted); }

    .toggle { text-align: center; font-size: 0.82rem; color: var(--muted); }
    .toggle a { color: var(--accent); cursor: pointer; font-weight: 500; }

    .msg { min-height: 18px; font-size: 0.78rem; text-align: center; margin-top: 10px; }
    .msg.error { color: var(--error); }
    .msg.ok    { color: var(--accent); }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
      .panel-left { display: none; }
      .panel-right { padding: 52px 28px; align-items: flex-start; }
      .form-logo { display: flex; }
    }
  </style>
</head>
<body>
<div class="layout" id="layout" style="opacity:0;transition:opacity 0.3s">

  <!-- Panel izquierdo: logo grande -->
  <div class="panel-left" style="position:relative;">
    <div class="panel-logo-area">
      <!-- Ícono barras + flecha -->
      <svg width="96" height="80" viewBox="0 0 96 80" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="52" width="20" height="28" rx="3" fill="rgba(255,255,255,0.4)"/>
        <rect x="25" y="34" width="20" height="46" rx="3" fill="rgba(255,255,255,0.6)"/>
        <rect x="50" y="8" width="20" height="72" rx="3" fill="white"/>
        <circle cx="60" cy="24" r="12" fill="rgba(61,107,82,0.6)" stroke="white" stroke-width="1.5"/>
        <path d="M55 29 L60 19 L65 29" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="60" y1="19" x2="60" y2="29" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <!-- Wordmark panel -->
      <div class="panel-wordmark">
        <span style="color:rgba(255,255,255,0.65)">fin</span><span style="color:white">Hub.</span>
      </div>
      <div class="panel-tagline">Finanzas simples, mente tranquila</div>
    </div>
    <!-- Badge kippcode -->
    <div style="position:absolute;bottom:24px;left:0;right:0;display:flex;justify-content:center;align-items:center;gap:7px;opacity:.35;pointer-events:none;user-select:none;">
      <svg width="14" height="14" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="6" y="6" width="36" height="36" rx="7" stroke="white" stroke-width="9" fill="none"/>
        <rect x="58" y="6" width="36" height="36" rx="7" stroke="white" stroke-width="9" fill="none"/>
        <rect x="6" y="58" width="36" height="36" rx="7" stroke="white" stroke-width="9" fill="none"/>
        <circle cx="76" cy="76" r="15" fill="#e86c2a"/>
      </svg>
      <span style="font-family:sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;color:white;">kippcode</span>
    </div>
  </div>

  <!-- Panel derecho: form -->
  <div class="panel-right">
    <div class="form-wrap">

      <!-- Logo pequeño (solo mobile) -->
      <div class="form-logo">
        <svg width="28" height="24" viewBox="0 0 96 80" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0" y="52" width="20" height="28" rx="3" fill="#3d6b52" opacity="0.4"/>
          <rect x="25" y="34" width="20" height="46" rx="3" fill="#3d6b52" opacity="0.65"/>
          <rect x="50" y="8" width="20" height="72" rx="3" fill="#3d6b52"/>
          <circle cx="60" cy="24" r="12" fill="white" stroke="#3d6b52" stroke-width="2"/>
          <path d="M55 29 L60 19 L65 29" stroke="#3d6b52" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="60" y1="19" x2="60" y2="29" stroke="#3d6b52" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span style="font-size:1.3rem;font-weight:700;letter-spacing:-0.02em">
          <span style="color:#8a8070">fin</span><span style="color:#3d6b52">Hub.</span>
        </span>
      </div>

      <div class="form-title" id="form-title">Bienvenido</div>
      <div class="form-sub" id="form-sub">Ingresá con tu cuenta para continuar</div>

      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="tu@email.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <div class="msg" id="msg"></div>
      <button class="btn" id="btn-login" onclick="handleLogin()">Ingresar</button>

      <div class="divider"><span>o</span></div>
      <div class="toggle" id="toggle-text">
        ¿No tenés cuenta? <a onclick="toggleMode()">Registrate gratis</a>
      </div>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ─── REEMPLAZÁ CON TU CONFIG ───
  const firebaseConfig = {
    apiKey:            "AIzaSyDKzetZ189S7Q4DIu4jN3cS7RcWPmF2q-A",
    authDomain:        "finhub-app-fb853.firebaseapp.com",
    databaseURL:       "https://finhub-app-fb853-default-rtdb.firebaseio.com",
    projectId:         "finhub-app-fb853",
    storageBucket:     "finhub-app-fb853.firebasestorage.app",
    messagingSenderId: "906737525390",
    appId:             "1:906737525390:web:3ae1bf5effca01c5f31fdf"
  };
  // ──────────────────────────────

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, user => {
    if (user) {
      window.location.href = 'app.html';
    } else {
      document.getElementById('layout').style.opacity = '1';
    }
  });

  let isRegister = false;

  window.toggleMode = () => {
    isRegister = !isRegister;
    document.getElementById('btn-login').textContent  = isRegister ? 'Crear cuenta' : 'Ingresar';
    document.getElementById('form-title').textContent = isRegister ? 'Crear cuenta' : 'Bienvenido';
    document.getElementById('form-sub').textContent   = isRegister ? 'Completá tus datos para registrarte' : 'Ingresá con tu cuenta para continuar';
    document.getElementById('toggle-text').innerHTML  = isRegister
      ? '¿Ya tenés cuenta? <a onclick="toggleMode()">Ingresá</a>'
      : '¿No tenés cuenta? <a onclick="toggleMode()">Registrate gratis</a>';
    setMsg('');
  };

  window.handleLogin = async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn-login');
    if (!email || !password) { setMsg('Completá todos los campos.', true); return; }
    btn.disabled = true; setMsg('');
    try {
      isRegister
        ? await createUserWithEmailAndPassword(auth, email, password)
        : await signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
      btn.disabled = false;
      const msgs = {
        'auth/user-not-found':      'No encontramos esa cuenta.',
        'auth/wrong-password':      'Contraseña incorrecta.',
        'auth/email-already-in-use':'Ese email ya está registrado.',
        'auth/weak-password':       'Mínimo 6 caracteres.',
        'auth/invalid-email':       'Email inválido.',
        'auth/invalid-credential':  'Credenciales inválidas.',
      };
      setMsg(msgs[e.code] || e.message, true);
    }
  };

  window.setMsg = (t, err = false) => {
    const el = document.getElementById('msg');
    el.textContent = t;
    el.className = 'msg ' + (err ? 'error' : 'ok');
  };

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.handleLogin();
  });
</script>
</body>
</html>
