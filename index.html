<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>finHub Business · Acceder</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body { font-family:'DM Sans',sans-serif; background:#f5f3f0; color:#1a1a18; min-height:100vh; }

    .layout { display:grid; grid-template-columns:1fr 1fr; width:100%; min-height:100vh; opacity:0; transition:opacity .3s; }

    /* ── Panel izquierdo azul ── */
    .panel-left {
      background:linear-gradient(145deg,#1a3a6b 0%,#1e4d8c 50%,#2a5fa0 100%);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:52px 48px; position:relative; overflow:hidden;
    }
    .panel-left::before { content:''; position:absolute; top:-80px; right:-80px; width:280px; height:280px; background:rgba(255,255,255,.05); border-radius:50%; }
    .panel-left::after  { content:''; position:absolute; bottom:-60px; left:-60px; width:200px; height:200px; background:rgba(255,255,255,.04); border-radius:50%; }

    .panel-logo-area { display:flex; flex-direction:column; align-items:center; gap:18px; position:relative; z-index:1; width:100%; max-width:300px; }

    .panel-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25);
      border-radius:20px; padding:4px 14px;
      font-size:.62rem; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:white;
    }
    .panel-badge::before { content:''; width:5px; height:5px; background:#c17a4a; border-radius:50%; }

    .panel-wordmark { font-family:'Plus Jakarta Sans',sans-serif; font-size:2.6rem; font-weight:800; letter-spacing:-.02em; line-height:1; }
    .panel-wordmark .fin { color:rgba(255,255,255,.6); }
    .panel-wordmark .hub { color:white; }
    .panel-tagline { font-size:.8rem; color:rgba(255,255,255,.5); text-align:center; line-height:1.6; }

    .panel-features { margin-top:32px; display:flex; flex-direction:column; gap:8px; width:100%; }
    .panel-feature {
      display:flex; align-items:center; gap:12px;
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1);
      padding:9px 14px;
    }
    .panel-feature-icon { font-size:.82rem; flex-shrink:0; }
    .panel-feature-text { font-size:.75rem; color:rgba(255,255,255,.7); }

    .panel-kippcode {
      position:absolute; bottom:22px;
      display:flex; align-items:center; gap:7px;
      opacity:.3; pointer-events:none; user-select:none; z-index:1;
    }
    .panel-kippcode span { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:.06em; color:white; }

    /* ── Panel derecho ── */
    .panel-right { display:flex; align-items:center; justify-content:center; padding:48px; background:#f5f3f0; }
    .form-wrap { width:100%; max-width:380px; }

    .form-logo { display:none; align-items:center; gap:10px; margin-bottom:28px; }
    .form-logo-text { font-family:'Plus Jakarta Sans',sans-serif; font-size:1.3rem; font-weight:700; letter-spacing:-.02em; }
    .form-logo-text .fin { color:#888; }
    .form-logo-text .hub { color:#1e4d8c; }

    .form-title { font-family:'Plus Jakarta Sans',sans-serif; font-size:1.7rem; font-weight:700; color:#1a1a18; margin-bottom:5px; }
    .form-subtitle { font-size:.83rem; color:#7a7a72; margin-bottom:32px; }

    .field-label { display:block; font-size:.65rem; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#3a3a38; margin-bottom:7px; }
    input[type=email], input[type=password] {
      width:100%; padding:12px 15px;
      border:1px solid #dddad5; border-radius:3px;
      background:white; font-family:'DM Sans',sans-serif;
      font-size:.9rem; color:#1a1a18; outline:none;
      transition:border-color .2s; margin-bottom:18px;
    }
    input:focus { border-color:#1e4d8c; }

    .btn-submit {
      width:100%; padding:13px;
      background:#1e4d8c; color:white; border:none; border-radius:3px;
      font-family:'DM Sans',sans-serif; font-size:.7rem; font-weight:700;
      letter-spacing:.14em; text-transform:uppercase;
      cursor:pointer; transition:background .2s; margin-top:6px;
    }
    .btn-submit:hover { background:#2a5fa0; }
    .btn-submit:disabled { opacity:.6; cursor:not-allowed; }

    .divider { display:flex; align-items:center; gap:12px; margin:22px 0; color:#c0bdb8; font-size:.72rem; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:#dddad5; }

    .toggle-link { text-align:center; font-size:.8rem; color:#7a7a72; }
    .toggle-link a { color:#1e4d8c; font-weight:600; text-decoration:none; cursor:pointer; }
    .toggle-link a:hover { text-decoration:underline; }

    .msg { font-size:.76rem; min-height:18px; margin-top:10px; text-align:center; }
    .msg.error { color:#9b3030; }
    .msg.ok    { color:#2d6a4f; }

    @media(max-width:700px) {
      .layout { grid-template-columns:1fr; }
      .panel-left { display:none; }
      .panel-right { padding:32px 24px; align-items:flex-start; padding-top:60px; }
      .form-logo { display:flex; }
    }
  </style>
</head>
<body>
<div class="layout" id="layout">

  <div class="panel-left">
    <div class="panel-logo-area">
      <svg width="60" height="50" viewBox="0 0 96 80" fill="none">
        <rect x="0" y="52" width="20" height="28" rx="3" fill="rgba(255,255,255,.35)"/>
        <rect x="25" y="34" width="20" height="46" rx="3" fill="rgba(255,255,255,.6)"/>
        <rect x="50" y="8" width="20" height="72" rx="3" fill="white"/>
        <circle cx="60" cy="24" r="12" fill="rgba(30,77,140,.55)" stroke="white" stroke-width="1.8"/>
        <path d="M55 29L60 19L65 29" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="60" y1="19" x2="60" y2="29" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      <div class="panel-badge">Business</div>
      <div class="panel-wordmark"><span class="fin">fin</span><span class="hub">Hub.</span></div>
      <div class="panel-tagline">Gestión financiera para PyMEs argentinas</div>
      <div class="panel-features">
        <div class="panel-feature"><span class="panel-feature-icon">📊</span><span class="panel-feature-text">Dashboard financiero en tiempo real</span></div>
        <div class="panel-feature"><span class="panel-feature-icon">📦</span><span class="panel-feature-text">Inventario y órdenes de compra</span></div>
        <div class="panel-feature"><span class="panel-feature-icon">🤝</span><span class="panel-feature-text">CRM y presupuestos vs real</span></div>
        <div class="panel-feature"><span class="panel-feature-icon">🧾</span><span class="panel-feature-text">IVA, RRHH y multi-usuario</span></div>
      </div>
    </div>
    <div class="panel-kippcode">
      <svg width="13" height="13" viewBox="0 0 100 100" fill="none">
        <rect x="6" y="6" width="36" height="36" rx="7" stroke="white" stroke-width="9" fill="none"/>
        <rect x="58" y="6" width="36" height="36" rx="7" stroke="white" stroke-width="9" fill="none"/>
        <rect x="6" y="58" width="36" height="36" rx="7" stroke="white" stroke-width="9" fill="none"/>
        <circle cx="76" cy="76" r="15" fill="#e86c2a"/>
      </svg>
      <span>kippcode</span>
    </div>
  </div>

  <div class="panel-right">
    <div class="form-wrap">
      <div class="form-logo">
        <svg width="26" height="22" viewBox="0 0 96 80" fill="none">
          <rect x="0" y="52" width="20" height="28" rx="3" fill="#1e4d8c" opacity=".35"/>
          <rect x="25" y="34" width="20" height="46" rx="3" fill="#1e4d8c" opacity=".6"/>
          <rect x="50" y="8" width="20" height="72" rx="3" fill="#1e4d8c"/>
          <circle cx="60" cy="24" r="12" fill="white" stroke="#1e4d8c" stroke-width="2"/>
          <path d="M55 29L60 19L65 29" stroke="#1e4d8c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <line x1="60" y1="19" x2="60" y2="29" stroke="#1e4d8c" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <div class="form-logo-text"><span class="fin">fin</span><span class="hub">Hub.</span></div>
      </div>

      <div class="form-title" id="form-title">Bienvenido</div>
      <div class="form-subtitle" id="form-subtitle">Ingresá con tu cuenta empresarial</div>

      <label class="field-label" for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="empresa@mail.com" autocomplete="email"/>

      <label class="field-label" for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>

      <button class="btn-submit" id="btn-submit" onclick="handleLogin()">Ingresar</button>
      <div class="msg" id="msg"></div>

      <div class="divider">o</div>
      <div class="toggle-link" id="toggle-link">
        ¿No tenés cuenta? <a onclick="toggleMode()">Registrate gratis</a>
      </div>
    </div>
  </div>

</div>
<script type="module">
  import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged }
                                 from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app  = initializeApp({
    apiKey:           "AIzaSyDEdKUEJighBOwemKjh0fMxr-TGN2U9Ulo",
    authDomain:       "finhub-business.firebaseapp.com",
    databaseURL:      "https://finhub-business-default-rtdb.firebaseio.com",
    projectId:        "finhub-business",
    storageBucket:    "finhub-business.appspot.com",
    messagingSenderId:"946602595680",
    appId:            "1:946602595680:web:0ebeacaa6c499b21f0fa05"
  });
  const auth = getAuth(app);

  // Verificar sesión existente una sola vez al cargar
  // Usar getIdToken en lugar de onAuthStateChanged para evitar loops
  auth.authStateReady().then(() => {
    const user = auth.currentUser;
    if (user) {
      window.location.href = 'app.html';
    } else {
      document.getElementById('layout').style.opacity = '1';
    }
  });

  let isRegister = false;

  window.toggleMode = () => {
    isRegister = !isRegister;
    document.getElementById('form-title').textContent    = isRegister ? 'Crear cuenta'  : 'Bienvenido';
    document.getElementById('form-subtitle').textContent = isRegister ? 'Completá tus datos para empezar' : 'Ingresá con tu cuenta empresarial';
    document.getElementById('btn-submit').textContent    = isRegister ? 'Crear cuenta'  : 'Ingresar';
    document.getElementById('toggle-link').innerHTML     = isRegister
      ? '¿Ya tenés cuenta? <a onclick="toggleMode()">Iniciá sesión</a>'
      : '¿No tenés cuenta? <a onclick="toggleMode()">Registrate gratis</a>';
    setMsg('');
  };

  window.handleLogin = async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btn-submit');
    if (!email || !password) { setMsg('Completá todos los campos.', true); return; }
    btn.disabled = true; setMsg('');
    try {
      isRegister
        ? await createUserWithEmailAndPassword(auth, email, password)
        : await signInWithEmailAndPassword(auth, email, password);
    } catch(e) {
      btn.disabled = false;
      const msgs = {
        'auth/user-not-found':      'No encontramos esa cuenta.',
        'auth/wrong-password':      'Contraseña incorrecta.',
        'auth/email-already-in-use':'Ese email ya está registrado.',
        'auth/weak-password':       'Mínimo 6 caracteres.',
        'auth/invalid-email':       'Email inválido.',
        'auth/invalid-credential':  'Credenciales inválidas.',
      };
      setMsg(msgs[e.code] || e.message, true);
    }
  };

  window.setMsg = (t, err=false) => {
    const el = document.getElementById('msg');
    el.textContent = t; el.className = 'msg '+(err?'error':'ok');
  };

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.handleLogin();
  });
</script>
</body>
</html>
